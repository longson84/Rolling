<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Draw - ERA VNBC MOVE UP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');

        :root {
            --gold: #fde047;
            --purple-main: #4c1d95;
            --deep-dark: #020617;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background: var(--deep-dark);
            min-height: 100vh;
            color: white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .app-outer {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            aspect-ratio: 12 / 4;
            position: relative;
            /* Hiệu ứng nền mô phỏng Key Visual bằng CSS */
            background-color: var(--deep-dark);
            background-image: 
                url('KV lucky draw.jpg'), /* Ưu tiên file ảnh của bạn */
                radial-gradient(circle at 50% 120%, rgba(253, 224, 71, 0.3) 0%, transparent 50%), /* Ánh sáng vàng dưới sàn */
                radial-gradient(circle at 50% 0%, rgba(76, 29, 149, 0.4) 0%, transparent 70%), /* Ánh tím trên đỉnh */
                linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.8) 100%); /* Làm tối chân sàn */
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(253, 224, 71, 0.2);
            box-shadow: 0 0 100px rgba(0, 0, 0, 1);
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            overflow: hidden;
        }

        /* Tạo các đường Line ánh sáng chạy dọc như trong KV */
        .app-container::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(90deg, transparent 0, transparent 49%, rgba(253, 224, 71, 0.05) 50%, transparent 51%);
            background-size: 100px 100%;
            pointer-events: none;
            opacity: 0.5;
        }

        .side-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            z-index: 10;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .side-panel.right {
            border-right: none;
            border-left: 1px solid rgba(255,255,255,0.05);
        }

        .main-stage {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .number-display {
            font-size: clamp(6rem, 18vw, 12rem);
            font-weight: 800;
            line-height: 1;
            color: var(--gold);
            text-shadow: 
                0 0 20px rgba(253, 224, 71, 0.5),
                0 0 40px rgba(234, 179, 8, 0.3),
                0 5px 15px rgba(0,0,0,0.5);
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        .spinning-effect {
            animation: glitch 0.15s infinite;
            filter: blur(1px);
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .input-style {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(253, 224, 71, 0.1);
            border-radius: 8px;
            padding: 10px;
            width: 100%;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .input-style:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #fde047 0%, #eab308 100%);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(234, 179, 8, 0.3);
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .history-list {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 0.6rem;
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .history-item span:first-child {
            color: var(--gold);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .logo-placeholder {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, #fde047);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(253, 224, 71, 0.3); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-outer">
        <div class="app-container">
            
            <!-- Cấu hình bên trái -->
            <div class="side-panel">
                <div class="mb-10 text-center">
                    <div class="logo-placeholder">ERA VNBC</div>
                    <div class="text-[9px] tracking-[4px] text-white/40 mt-1 uppercase">Move Up 2024</div>
                </div>

                <div class="space-y-6 flex-grow">
                    <div>
                        <label class="block text-[10px] text-white/40 mb-2 font-bold uppercase tracking-widest">Phạm vi quay số</label>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="minInput" value="1" class="input-style text-center" title="Từ số">
                            <input type="number" id="maxInput" value="999" class="input-style text-center" title="Đến số">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] text-white/40 mb-2 font-bold uppercase tracking-widest">Thời gian (giây)</label>
                        <input type="number" id="durationInput" value="4" min="1" max="15" class="input-style">
                    </div>
                </div>

                <button id="spinBtn" class="btn-primary w-full">BẮT ĐẦU</button>
            </div>

            <!-- Khu vực hiển thị số -->
            <div class="main-stage">
                <div id="statusLabel" class="text-[10px] font-bold tracking-[0.6em] text-white/30 uppercase mb-4">Hệ thống sẵn sàng</div>
                <div id="resultNumber" class="number-display">000</div>
                <div class="mt-8 flex gap-4 opacity-20">
                   <div class="h-[1px] w-20 bg-gradient-to-r from-transparent to-white"></div>
                   <div class="h-[1px] w-20 bg-gradient-to-l from-transparent to-white"></div>
                </div>
            </div>

            <!-- Danh sách trúng thưởng bên phải -->
            <div class="side-panel right">
                <div class="mb-6">
                    <span class="text-[10px] font-bold tracking-widest text-white/40 uppercase">Lịch sử trúng giải</span>
                </div>
                
                <div id="history" class="history-list">
                    <!-- Items sẽ xuất hiện ở đây -->
                </div>

                <button id="clearHistory" class="mt-4 text-[9px] text-white/20 hover:text-white/40 uppercase tracking-widest transition-colors">Làm mới danh sách</button>
            </div>
        </div>
    </div>

    <script>
        const minInput = document.getElementById('minInput');
        const maxInput = document.getElementById('maxInput');
        const durationInput = document.getElementById('durationInput');
        const spinBtn = document.getElementById('spinBtn');
        const resultNumber = document.getElementById('resultNumber');
        const statusLabel = document.getElementById('statusLabel');
        const historyContainer = document.getElementById('history');
        const clearHistoryBtn = document.getElementById('clearHistory');

        let isSpinning = false;

        function playTick() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, ctx.currentTime);
                g.gain.setValueAtTime(0.05, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.04);
                osc.connect(g);
                g.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.04);
            } catch(e) {}
        }

        function triggerConfetti() {
            const count = 200;
            const defaults = { origin: { y: 0.7 }, zIndex: 1000 };

            function fire(particleRatio, opts) {
                confetti({
                    ...defaults,
                    ...opts,
                    particleCount: Math.floor(count * particleRatio)
                });
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }

        function addHistory(val) {
            const item = document.createElement('div');
            item.className = 'history-item';
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            item.innerHTML = `<span>#${val}</span><span class="text-[10px] text-white/20">${time}</span>`;
            historyContainer.prepend(item);
        }

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;

            const min = parseInt(minInput.value);
            const max = parseInt(maxInput.value);
            const durationSec = parseFloat(durationInput.value);

            if (isNaN(min) || isNaN(max) || min >= max) {
                statusLabel.textContent = "LỖI: KIỂM TRA PHẠM VI";
                statusLabel.style.color = "#ef4444";
                return;
            }

            isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.style.filter = "grayscale(1)";
            statusLabel.textContent = "HỆ THỐNG ĐANG QUAY SỐ...";
            statusLabel.style.color = "rgba(255,255,255,0.3)";
            resultNumber.classList.add('spinning-effect');

            const startTime = Date.now();
            const endTime = startTime + (durationSec * 1000);

            function update() {
                const now = Date.now();
                const remaining = endTime - now;

                if (remaining > 0) {
                    const randomVal = Math.floor(Math.random() * (max - min + 1)) + min;
                    resultNumber.textContent = randomVal.toString().padStart(3, '0');
                    
                    if (Math.random() > 0.3) playTick();
                    requestAnimationFrame(update);
                } else {
                    const winner = Math.floor(Math.random() * (max - min + 1)) + min;
                    resultNumber.textContent = winner.toString().padStart(3, '0');
                    resultNumber.classList.remove('spinning-effect');
                    
                    statusLabel.textContent = "CHÚC MỪNG CHIẾN THẮNG!";
                    statusLabel.style.color = "var(--gold)";
                    
                    triggerConfetti();
                    addHistory(winner);

                    isSpinning = false;
                    spinBtn.disabled = false;
                    spinBtn.style.filter = "none";
                }
            }

            requestAnimationFrame(update);
        });

        clearHistoryBtn.addEventListener('click', () => {
            historyContainer.innerHTML = '';
        });
    </script>
</body>
</html>
