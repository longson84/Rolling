<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quay Số May Mắn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Lexend', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b, #020617);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .spinning-ring {
            border: 4px solid transparent;
            border-top-color: #6366f1;
            border-right-color: #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .number-display {
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.8), 0 0 40px rgba(168, 85, 247, 0.4);
        }

        .input-glow:focus {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
            border-color: #6366f1;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #312e81;
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full glass-card p-8 shadow-2xl">
        <h1 class="text-3xl font-extrabold text-center mb-8 bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent uppercase tracking-wider">
            Quay Số May Mắn
        </h1>

        <div class="space-y-4 mb-8">
            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="block text-xs text-indigo-300 mb-1 font-semibold">SỐ BÉ NHẤT</label>
                    <input type="number" id="minInput" value="1" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none input-glow transition-all">
                </div>
                <div class="flex-1">
                    <label class="block text-xs text-indigo-300 mb-1 font-semibold">SỐ LỚN NHẤT</label>
                    <input type="number" id="maxInput" value="100" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none input-glow transition-all">
                </div>
            </div>
            <div>
                <label class="block text-xs text-indigo-300 mb-1 font-semibold">THỜI GIAN QUAY (GIÂY)</label>
                <input type="number" id="durationInput" value="3" min="1" max="10" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none input-glow transition-all">
            </div>
        </div>

        <div class="relative flex items-center justify-center mb-10 h-64 w-64 mx-auto">
            <!-- Animated rings -->
            <div id="ring1" class="absolute inset-0 spinning-ring opacity-20" style="animation-duration: 3s;"></div>
            <div id="ring2" class="absolute inset-4 spinning-ring opacity-40" style="animation-duration: 1.5s; animation-direction: reverse;"></div>
            <div id="ring3" class="absolute inset-8 spinning-ring opacity-60" style="animation-duration: 0.8s;"></div>
            
            <!-- Result display -->
            <div class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/50 rounded-full border border-white/5 shadow-inner">
                <div id="statusText" class="text-xs text-indigo-400 font-bold mb-1 uppercase tracking-tighter">Sẵn sàng</div>
                <div id="resultNumber" class="text-7xl font-black number-display transition-all duration-75">?</div>
            </div>
        </div>

        <button id="spinBtn" class="w-full py-4 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 font-bold text-lg shadow-lg shadow-indigo-900/20 active:scale-95 transition-all">
            BẮT ĐẦU QUAY
        </button>

        <div class="mt-8">
            <h3 class="text-xs font-bold text-slate-500 mb-2 uppercase">Lịch sử</h3>
            <div id="history" class="flex flex-wrap gap-2 max-h-24 overflow-y-auto pr-2">
                <!-- History items go here -->
            </div>
        </div>
    </div>

    <script>
        const minInput = document.getElementById('minInput');
        const maxInput = document.getElementById('maxInput');
        const durationInput = document.getElementById('durationInput');
        const spinBtn = document.getElementById('spinBtn');
        const resultNumber = document.getElementById('resultNumber');
        const statusText = document.getElementById('statusText');
        const historyContainer = document.getElementById('history');
        const rings = [document.getElementById('ring1'), document.getElementById('ring2'), document.getElementById('ring3')];

        let isSpinning = false;

        function createAudioTick() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, ctx.currentTime);
            gain.gain.setValueAtTime(0.05, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        }

        function addToHistory(num) {
            const span = document.createElement('span');
            span.className = 'px-3 py-1 bg-white/5 rounded-full text-sm font-mono text-indigo-300 border border-white/5 animate-bounce';
            span.textContent = num;
            historyContainer.prepend(span);
        }

        function triggerCelebration() {
            const count = 200;
            const defaults = {
                origin: { y: 0.7 },
                zIndex: 1000
            };

            function fire(particleRatio, opts) {
                confetti({
                    ...defaults,
                    ...opts,
                    particleCount: Math.floor(count * particleRatio)
                });
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;

            const min = parseInt(minInput.value);
            const max = parseInt(maxInput.value);
            const duration = parseFloat(durationInput.value) * 1000;

            if (isNaN(min) || isNaN(max) || min >= max) {
                statusText.textContent = "Lỗi khoảng số";
                statusText.classList.add('text-red-500');
                return;
            }

            isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.classList.add('opacity-50', 'cursor-not-allowed');
            statusText.textContent = "Đang quay...";
            statusText.classList.remove('text-red-500');
            resultNumber.classList.remove('scale-110', 'text-indigo-400');
            
            // Speed up rings
            rings.forEach((ring, i) => {
                ring.style.animationDuration = (0.2 + (i * 0.1)) + 's';
                ring.style.opacity = '1';
            });

            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = elapsed / duration;

                if (progress < 1) {
                    // Random number effect
                    const randomVal = Math.floor(Math.random() * (max - min + 1)) + min;
                    resultNumber.textContent = randomVal;
                    
                    // Sound effect frequency decreases over time
                    if (Math.random() > progress) {
                        createAudioTick();
                    }

                    // Slow down rings over time
                    rings.forEach((ring, i) => {
                        ring.style.animationDuration = (0.1 + progress * 2) + 's';
                    });

                    requestAnimationFrame(animate);
                } else {
                    // Finish
                    const finalResult = Math.floor(Math.random() * (max - min + 1)) + min;
                    resultNumber.textContent = finalResult;
                    resultNumber.classList.add('scale-110', 'text-indigo-400');
                    statusText.textContent = "Kết quả";
                    
                    rings.forEach((ring, i) => {
                        ring.style.animationDuration = (2 + i) + 's';
                        ring.style.opacity = (0.2 + (i * 0.2)).toString();
                    });

                    triggerCelebration();
                    addToHistory(finalResult);

                    isSpinning = false;
                    spinBtn.disabled = false;
                    spinBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            }

            requestAnimationFrame(animate);
        });
    </script>
</body>
</html>
