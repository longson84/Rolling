<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quay Số May Mắn - Widescreen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Lexend', sans-serif;
            background: radial-gradient(circle at center, #0f172a, #020617);
            min-height: 100vh;
            color: white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 12 x 4 Ratio Container */
        .app-container {
            width: 95vw;
            max-width: 1200px;
            aspect-ratio: 12 / 4;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 1px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 1024px) {
            .app-container {
                aspect-ratio: auto;
                grid-template-columns: 1fr;
                height: auto;
                max-height: 90vh;
                overflow-y: auto;
            }
        }

        .section-panel {
            background: rgba(15, 23, 42, 0.6);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .spinning-ring {
            border: 6px solid transparent;
            border-top-color: #6366f1;
            border-right-color: #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .number-display {
            font-size: clamp(5rem, 15vw, 10rem);
            text-shadow: 0 0 30px rgba(99, 102, 241, 0.6), 0 0 60px rgba(168, 85, 247, 0.3);
            line-height: 1;
        }

        .input-glow:focus {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
            border-color: #6366f1;
        }

        .history-item {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Cột trái: Cấu hình -->
        <div class="section-panel border-r border-white/10">
            <h2 class="text-indigo-400 font-bold text-sm tracking-widest mb-6 uppercase">Cấu hình</h2>
            <div class="space-y-4 flex-grow">
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 font-bold">SỐ BÉ NHẤT</label>
                    <input type="number" id="minInput" value="1" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white outline-none input-glow transition-all">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 font-bold">SỐ LỚN NHẤT</label>
                    <input type="number" id="maxInput" value="100" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white outline-none input-glow transition-all">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 font-bold">THỜI GIAN (GIÂY)</label>
                    <input type="number" id="durationInput" value="3" min="1" max="10" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white outline-none input-glow transition-all">
                </div>
            </div>
            <button id="spinBtn" class="mt-4 w-full py-4 rounded-xl bg-gradient-to-br from-indigo-600 to-purple-700 hover:from-indigo-500 hover:to-purple-600 font-extrabold text-sm shadow-lg active:scale-95 transition-all">
                BẮT ĐẦU QUAY
            </button>
        </div>

        <!-- Cột giữa: Hiển thị chính -->
        <div class="section-panel relative items-center justify-center overflow-hidden">
            <!-- Background Rings -->
            <div id="ring1" class="absolute h-[80%] aspect-square spinning-ring opacity-10" style="animation-duration: 4s;"></div>
            <div id="ring2" class="absolute h-[70%] aspect-square spinning-ring opacity-20" style="animation-duration: 2s; animation-direction: reverse;"></div>
            
            <div class="relative z-10 flex flex-col items-center">
                <div id="statusText" class="text-xs font-black text-indigo-400 mb-2 uppercase tracking-[0.3em] opacity-60">Sẵn sàng</div>
                <div id="resultNumber" class="number-display font-black transition-all duration-75">?</div>
            </div>
        </div>

        <!-- Cột phải: Lịch sử -->
        <div class="section-panel border-l border-white/10">
            <h2 class="text-indigo-400 font-bold text-sm tracking-widest mb-4 uppercase">Lịch sử</h2>
            <div id="history" class="flex flex-col gap-2 overflow-y-auto flex-grow pr-2">
                <!-- History elements -->
            </div>
            <div class="mt-4 pt-4 border-t border-white/5 text-[10px] text-slate-500 text-center uppercase tracking-tighter">
                Hệ thống quay số v2.0
            </div>
        </div>
    </div>

    <script>
        const minInput = document.getElementById('minInput');
        const maxInput = document.getElementById('maxInput');
        const durationInput = document.getElementById('durationInput');
        const spinBtn = document.getElementById('spinBtn');
        const resultNumber = document.getElementById('resultNumber');
        const statusText = document.getElementById('statusText');
        const historyContainer = document.getElementById('history');
        const ring1 = document.getElementById('ring1');
        const ring2 = document.getElementById('ring2');

        let isSpinning = false;

        function createAudioTick() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, ctx.currentTime);
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.05);
            } catch(e) {}
        }

        function addToHistory(num) {
            const div = document.createElement('div');
            div.className = 'history-item flex justify-between items-center px-4 py-2 bg-white/5 rounded-lg border border-white/5';
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            div.innerHTML = `
                <span class="text-indigo-300 font-black text-lg">${num}</span>
                <span class="text-[10px] text-slate-500 font-mono">${timeStr}</span>
            `;
            historyContainer.prepend(div);
        }

        function triggerCelebration() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#6366f1', '#a855f7', '#ffffff']
            });
        }

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;

            const min = parseInt(minInput.value);
            const max = parseInt(maxInput.value);
            const duration = parseFloat(durationInput.value) * 1000;

            if (isNaN(min) || isNaN(max) || min >= max) {
                statusText.textContent = "Lỗi giá trị";
                statusText.classList.add('text-red-500');
                return;
            }

            isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.style.opacity = '0.5';
            statusText.textContent = "ĐANG QUAY...";
            statusText.classList.remove('text-red-500');
            resultNumber.classList.remove('scale-110', 'text-indigo-400');
            
            // Speed up rings
            ring1.style.animationDuration = '0.3s';
            ring1.style.opacity = '0.6';
            ring2.style.animationDuration = '0.2s';
            ring2.style.opacity = '0.8';

            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = elapsed / duration;

                if (progress < 1) {
                    const randomVal = Math.floor(Math.random() * (max - min + 1)) + min;
                    resultNumber.textContent = randomVal;
                    
                    if (Math.random() > 0.5 + (progress * 0.4)) {
                        createAudioTick();
                    }

                    requestAnimationFrame(animate);
                } else {
                    const finalResult = Math.floor(Math.random() * (max - min + 1)) + min;
                    resultNumber.textContent = finalResult;
                    resultNumber.classList.add('scale-110', 'text-indigo-400');
                    statusText.textContent = "CHÚC MỪNG";
                    
                    ring1.style.animationDuration = '4s';
                    ring1.style.opacity = '0.1';
                    ring2.style.animationDuration = '2s';
                    ring2.style.opacity = '0.2';

                    triggerCelebration();
                    addToHistory(finalResult);

                    isSpinning = false;
                    spinBtn.disabled = false;
                    spinBtn.style.opacity = '1';
                }
            }

            requestAnimationFrame(animate);
        });
    </script>
</body>
</html>
